# Nix-owned OMX baseline. Home Manager replaces store placeholders before
# seeding the writable user configuration.
notify = ["node", "@OMX_ROOT@/dist/scripts/notify-hook.js"]
model = "gpt-5.4"
model_reasoning_effort = "medium"
model_context_window = 1000000
model_auto_compact_token_limit = 900000

[features]
multi_agent = true
child_agents_md = true
codex_hooks = true

[env]
USE_OMX_EXPLORE_CMD = "1"

[agents]
max_threads = 6
max_depth = 2

[mcp_servers.nixos]
command = "@mcp-nixos@"
startup_timeout_sec = 30

[mcp_servers.omx_state]
command = "node"
args = ["@OMX_ROOT@/dist/mcp/state-server.js"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_memory]
command = "node"
args = ["@OMX_ROOT@/dist/mcp/memory-server.js"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_code_intel]
command = "node"
args = ["@OMX_ROOT@/dist/mcp/code-intel-server.js"]
enabled = true
startup_timeout_sec = 10

[mcp_servers.omx_trace]
command = "node"
args = ["@OMX_ROOT@/dist/mcp/trace-server.js"]
enabled = true
startup_timeout_sec = 5

[mcp_servers.omx_wiki]
command = "node"
args = ["@OMX_ROOT@/dist/mcp/wiki-server.js"]
enabled = true
startup_timeout_sec = 5

[tui]
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit"]

[notice]
hide_rate_limit_model_nudge = true
